about:
  title: "Architecting Systems, Leading Teams"
  description: |
    I'm a Principal Engineer and Software Architect with 8+ years of experience leading engineering teams and designing the systems behind scalable, high-performance web applications. My focus is on the decisions that shape a product early—system architecture, technical direction, and the engineering standards that let teams move fast without piling up debt.
    I lead by staying close to the code: setting up architecture, reviewing critical paths, mentoring engineers, and shipping alongside the team across Vue.js, React, Ruby on Rails, and modern cloud infrastructure. I care most about building systems—and the teams behind them—that scale cleanly under real-world pressure.
